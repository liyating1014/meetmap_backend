services:
  - type: web
    name: meetmap-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: BASE_URL
        sync: false
      - key: API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./travel_note.db
